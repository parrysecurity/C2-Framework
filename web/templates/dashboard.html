<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Framework Console</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #00ff41;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 300px;
            background: #0d1117;
            border-right: 1px solid #00ff41;
            overflow-y: auto;
            padding: 20px;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .terminal {
            background: #000000;
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .command-input {
            background: #0d1117;
            border-top: 1px solid #00ff41;
            padding: 15px;
            display: flex;
        }
        
        .command-input input {
            background: #000000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .command-input button {
            background: #00ff41;
            color: #000000;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .agent-list {
            list-style: none;
        }
        
        .agent-item {
            padding: 10px;
            margin: 5px 0;
            background: #1a1f2e;
            cursor: pointer;
            border-left: 3px solid #00ff41;
        }
        
        .agent-item:hover {
            background: #2a2f3e;
        }
        
        .agent-item.active {
            background: #00ff41;
            color: #000000;
        }
        
        .agent-info {
            font-size: 12px;
            margin-top: 5px;
            color: #888;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-active {
            background: #00ff41;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .command-line {
            margin: 5px 0;
            color: #ffffff;
        }
        
        .command-input-line {
            color: #00ff41;
        }
        
        .command-output {
            color: #cccccc;
            margin-left: 20px;
            white-space: pre-wrap;
        }
        
        .error {
            color: #ff4444;
        }
        
        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>🕶️ C2 Framework</h2>
            <h3>Active Agents</h3>
            <div id="agent-list">
                <!-- Agents will be loaded here -->
            </div>
        </div>
        
        <div class="main-content">
            <div class="terminal" id="terminal">
                <div class="command-line">C2 Framework Console v1.0</div>
                <div class="command-line">Type 'help' for available commands</div>
                <div class="command-line">=======================================</div>
                <div id="output-area"></div>
            </div>
            
            <div class="command-input">
                <input type="text" id="command" placeholder="Enter command..." autocomplete="off">
                <button onclick="sendCommand()">Execute</button>
            </div>
        </div>
    </div>
    
    <script>
        let socket = io();
        let currentAgent = null;
        
        // Load agents periodically
        function loadAgents() {
            fetch('/api/agents')
                .then(response => response.json())
                .then(agents => {
                    const agentList = document.getElementById('agent-list');
                    agentList.innerHTML = '<div style="font-size:12px">Connected Agents:</div>';
                    
                    agents.forEach(agent => {
                        const agentDiv = document.createElement('div');
                        agentDiv.className = 'agent-item';
                        if (currentAgent === agent.agent_id) {
                            agentDiv.classList.add('active');
                        }
                        agentDiv.onclick = () => selectAgent(agent.agent_id);
                        agentDiv.innerHTML = `
                            <div>
                                <span class="status-indicator status-active"></span>
                                <strong>${agent.agent_id}</strong>
                            </div>
                            <div class="agent-info">
                                ${agent.hostname} | ${agent.username}<br>
                                ${agent.os} | ${agent.ip}
                            </div>
                        `;
                        agentList.appendChild(agentDiv);
                    });
                });
        }
        
        function selectAgent(agentId) {
            currentAgent = agentId;
            addToTerminal(`[+] Selected agent: ${currentAgent}`, 'info');
            loadAgents();
        }
        
        function addToTerminal(text, type = 'output') {
            const outputArea = document.getElementById('output-area');
            const line = document.createElement('div');
            
            if (type === 'command') {
                line.innerHTML = `<div class="command-input-line">${currentAgent ? currentAgent + '# ' : ''}${text}</div>`;
            } else if (type === 'error') {
                line.innerHTML = `<div class="command-output error">${text}</div>`;
            } else {
                line.innerHTML = `<div class="command-output">${text}</div>`;
            }
            
            outputArea.appendChild(line);
            const terminal = document.getElementById('terminal');
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        function sendCommand() {
            const input = document.getElementById('command');
            const command = input.value.trim();
            
            if (!command) return;
            if (!currentAgent) {
                addToTerminal('[-] No agent selected! Please select an agent first.', 'error');
                input.value = '';
                return;
            }
            
            addToTerminal(command, 'command');
            
            // Send command to agent via WebSocket
            socket.emit('command', {
                agent_id: currentAgent,
                command: command
            });
            
            input.value = '';
        }
        
        socket.on('command_response', (data) => {
            if (data.status === 'completed') {
                addToTerminal(data.output);
            } else if (data.status === 'error') {
                addToTerminal(`[-] Error: ${data.message}`, 'error');
            }
        });
        
        socket.on('task_complete', (data) => {
            if (data.agent_id === currentAgent) {
                addToTerminal(data.output);
            }
        });
        
        // Load agents every 5 seconds
        setInterval(loadAgents, 5000);
        loadAgents();
        
        // Handle enter key
        document.getElementById('command').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendCommand();
            }
        });
    </script>
</body>
</html>
